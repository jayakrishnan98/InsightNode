services:
  redpanda:
    image: docker.redpanda.com/redpandadata/redpanda:v24.2.4
    container_name: insightnode-redpanda
    command:
      - redpanda
      - start
      - --overprovisioned
      - --smp
      - "1"
      - --memory
      - "512M"
      - --reserve-memory
      - "0M"
      - --node-id
      - "0"
      - --check=false
      - --kafka-addr
      - PLAINTEXT://0.0.0.0:9092
      - --advertise-kafka-addr
      - PLAINTEXT://localhost:9092
    ports:
      - "9092:9092"
    # Kafka-compatible API for Phase 2 Day 5 (no Zookeeper needed)

  # Phase 3 Day 1 — columnar store for analytical / aggregate queries
  clickhouse:
    image: clickhouse/clickhouse-server:24.8
    container_name: insightnode-clickhouse
    environment:
      # Required: without these, Docker disables network access for `default`.
      CLICKHOUSE_DB: insightnode
      CLICKHOUSE_USER: insightnode
      CLICKHOUSE_PASSWORD: insightnode
      CLICKHOUSE_DEFAULT_ACCESS_MANAGEMENT: "1"
    ports:
      - "8123:8123" # HTTP (clickhouse-connect)
      - "9000:9000" # native TCP (clickhouse-client CLI)
    volumes:
      - ./sql/clickhouse:/docker-entrypoint-initdb.d:ro
      - clickhouse_data:/var/lib/clickhouse
    ulimits:
      nofile:
        soft: 262144
        hard: 262144
    healthcheck:
      test: ["CMD", "wget", "--spider", "-q", "http://localhost:8123/ping"]
      interval: 5s
      timeout: 3s
      retries: 10

  # Phase 4 Day 1 — full-text log search (single-node, security disabled for local learning)
  opensearch:
    image: opensearchproject/opensearch:2.11.1
    container_name: insightnode-opensearch
    environment:
      - discovery.type=single-node
      - DISABLE_INSTALL_DEMO_CONFIG=true
      - DISABLE_SECURITY_PLUGIN=true
      - bootstrap.memory_lock=true
      - "OPENSEARCH_JAVA_OPTS=-Xms512m -Xmx512m"
      - cluster.name=insightnode
      - node.name=insightnode-opensearch
    ulimits:
      memlock:
        soft: -1
        hard: -1
      nofile:
        soft: 65536
        hard: 65536
    ports:
      - "9200:9200"
    volumes:
      - opensearch_data:/usr/share/opensearch/data
    healthcheck:
      test: ["CMD-SHELL", "curl -sf http://localhost:9200 >/dev/null || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 20
      start_period: 30s

  # Phase 5 Day 1 — distributed tracing (Jaeger all-in-one + OTLP)
  jaeger:
    image: jaegertracing/all-in-one:1.57
    container_name: insightnode-jaeger
    environment:
      - COLLECTOR_OTLP_ENABLED=true
      # Listen on all interfaces so the host / other containers can export OTLP.
      - COLLECTOR_OTLP_GRPC_HOST_PORT=0.0.0.0:4317
      - COLLECTOR_OTLP_HTTP_HOST_PORT=0.0.0.0:4318
    ports:
      - "16686:16686" # Jaeger UI
      - "4317:4317"   # OTLP gRPC
      - "4318:4318"   # OTLP HTTP
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://127.0.0.1:14269/ >/dev/null || exit 1"]
      interval: 5s
      timeout: 3s
      retries: 20
      start_period: 10s

  # Phase 7 — scrape API/worker process metrics (host processes via host.docker.internal)
  prometheus:
    image: prom/prometheus:v2.54.1
    container_name: insightnode-prometheus
    ports:
      - "9090:9090"
    volumes:
      - ./infrastructure/prometheus/prometheus.yml:/etc/prometheus/prometheus.yml:ro
      - prometheus_data:/prometheus
    extra_hosts:
      - "host.docker.internal:host-gateway"
    command:
      - --config.file=/etc/prometheus/prometheus.yml
      - --storage.tsdb.path=/prometheus
      - --web.enable-lifecycle
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://127.0.0.1:9090/-/healthy >/dev/null || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 10s

  # Phase 7 — Grafana for operational metrics (ClickHouse primary, Postgres optional)
  grafana:
    image: grafana/grafana:11.2.0
    container_name: insightnode-grafana
    depends_on:
      clickhouse:
        condition: service_healthy
      prometheus:
        condition: service_healthy
    ports:
      - "3000:3000"
    environment:
      - GF_SECURITY_ADMIN_USER=${GF_SECURITY_ADMIN_USER:-admin}
      - GF_SECURITY_ADMIN_PASSWORD=${GF_SECURITY_ADMIN_PASSWORD:-admin}
      - GF_USERS_ALLOW_SIGN_UP=false
      - GF_INSTALL_PLUGINS=grafana-clickhouse-datasource
      # Datasource provisioning substitutes these into datasources.yml
      - CLICKHOUSE_HOST=clickhouse
      - CLICKHOUSE_PORT=8123
      - CLICKHOUSE_USER=${CLICKHOUSE_USER:-insightnode}
      - CLICKHOUSE_PASSWORD=${CLICKHOUSE_PASSWORD:-insightnode}
      - CLICKHOUSE_DATABASE=${CLICKHOUSE_DATABASE:-insightnode}
      # Host Postgres (not in Compose) — reachable via host.docker.internal on Docker Desktop
      - POSTGRES_HOST=${POSTGRES_HOST:-host.docker.internal}
      - POSTGRES_PORT=${POSTGRES_PORT:-5432}
      - POSTGRES_USER=${POSTGRES_USER:-insightnode}
      - POSTGRES_PASSWORD=${POSTGRES_PASSWORD:-insightnode}
      - POSTGRES_DATABASE=${POSTGRES_DATABASE:-insightnode}
      # Webhook contact point auth (must match API GRAFANA_WEBHOOK_SECRET)
      - GRAFANA_WEBHOOK_SECRET=${GRAFANA_WEBHOOK_SECRET:-dev-webhook-secret}
    volumes:
      - grafana_data:/var/lib/grafana
      - ./infrastructure/grafana/provisioning:/etc/grafana/provisioning:ro
      - ./infrastructure/grafana/dashboards:/var/lib/grafana/dashboards:ro
    extra_hosts:
      - "host.docker.internal:host-gateway"
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://127.0.0.1:3000/api/health >/dev/null || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 20
      start_period: 30s

volumes:
  clickhouse_data:
  opensearch_data:
  grafana_data:
  prometheus_data:
