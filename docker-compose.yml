services:
  redpanda:
    image: docker.redpanda.com/redpandadata/redpanda:v24.2.4
    container_name: insightnode-redpanda
    command:
      - redpanda
      - start
      - --overprovisioned
      - --smp
      - "1"
      - --memory
      - "512M"
      - --reserve-memory
      - "0M"
      - --node-id
      - "0"
      - --check=false
      - --kafka-addr
      - PLAINTEXT://0.0.0.0:9092
      - --advertise-kafka-addr
      - PLAINTEXT://localhost:9092
    ports:
      - "9092:9092"
    # Kafka-compatible API for Phase 2 Day 5 (no Zookeeper needed)

  # Phase 3 Day 1 — columnar store for analytical / aggregate queries
  clickhouse:
    image: clickhouse/clickhouse-server:24.8
    container_name: insightnode-clickhouse
    environment:
      # Required: without these, Docker disables network access for `default`.
      CLICKHOUSE_DB: insightnode
      CLICKHOUSE_USER: insightnode
      CLICKHOUSE_PASSWORD: insightnode
      CLICKHOUSE_DEFAULT_ACCESS_MANAGEMENT: "1"
    ports:
      - "8123:8123" # HTTP (clickhouse-connect)
      - "9000:9000" # native TCP (clickhouse-client CLI)
    volumes:
      - ./sql/clickhouse:/docker-entrypoint-initdb.d:ro
      - clickhouse_data:/var/lib/clickhouse
    ulimits:
      nofile:
        soft: 262144
        hard: 262144
    healthcheck:
      test: ["CMD", "wget", "--spider", "-q", "http://localhost:8123/ping"]
      interval: 5s
      timeout: 3s
      retries: 10

  # Phase 4 Day 1 — full-text log search (single-node, security disabled for local learning)
  opensearch:
    image: opensearchproject/opensearch:2.11.1
    container_name: insightnode-opensearch
    environment:
      - discovery.type=single-node
      - DISABLE_INSTALL_DEMO_CONFIG=true
      - DISABLE_SECURITY_PLUGIN=true
      - bootstrap.memory_lock=true
      - "OPENSEARCH_JAVA_OPTS=-Xms512m -Xmx512m"
      - cluster.name=insightnode
      - node.name=insightnode-opensearch
    ulimits:
      memlock:
        soft: -1
        hard: -1
      nofile:
        soft: 65536
        hard: 65536
    ports:
      - "9200:9200"
    volumes:
      - opensearch_data:/usr/share/opensearch/data
    healthcheck:
      test: ["CMD-SHELL", "curl -sf http://localhost:9200 >/dev/null || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 20
      start_period: 30s

  # Phase 5 Day 1 — distributed tracing (Jaeger all-in-one + OTLP)
  jaeger:
    image: jaegertracing/all-in-one:1.57
    container_name: insightnode-jaeger
    environment:
      - COLLECTOR_OTLP_ENABLED=true
      # Listen on all interfaces so the host / other containers can export OTLP.
      - COLLECTOR_OTLP_GRPC_HOST_PORT=0.0.0.0:4317
      - COLLECTOR_OTLP_HTTP_HOST_PORT=0.0.0.0:4318
    ports:
      - "16686:16686" # Jaeger UI
      - "4317:4317"   # OTLP gRPC
      - "4318:4318"   # OTLP HTTP
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://127.0.0.1:14269/ >/dev/null || exit 1"]
      interval: 5s
      timeout: 3s
      retries: 20
      start_period: 10s

volumes:
  clickhouse_data:
  opensearch_data:
